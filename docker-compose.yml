services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: leadfinder
      POSTGRES_USER: leadfinder
      POSTGRES_PASSWORD: leadfinder
    ports:
      - "5432:5432"
    volumes:
      - leadfinder_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U leadfinder"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  leadfinder_postgres:
