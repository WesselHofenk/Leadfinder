name: Validate Leadfinder

on:
  push:
    branches:
      - main
      - "codex/**"
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build
        env:
          DATABASE_URL: postgresql://build:build@localhost:5432/build
          AUTH_SECRET: build-only-secret-at-least-32-characters
          CRON_SECRET: build-only-cron-secret-at-least-32-characters
